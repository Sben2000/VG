<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!--import des fonts  lobster et montserrat depuis googlefonts-->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
			rel="stylesheet"
		/>

		<!--link css-->
		<link rel="stylesheet" href="./contact.css" />
	</head>

	<body>
		<div class="main">
			<div class="separator"><h1 class="sectionTitle">Nous contacter</h1></div>
		<section class="contact" id="contact">
            <div class="contactForm">
                    <form action="" method="" class="form-contact">
                        <div class="formTop">

                                    <label for="nom">Nom / Prénom</label>
                                    <input type="text" name="nom" placeholder="Mon nom et prénom" autocomplete ="off"  required /> 

                                    <label for="email">Email</label>
                                    <!--le type email permettant de s'assurer que l'utilisateur entre bien un email avec @-->
                                    <input type="email" name="email" placeholder="Email@NomdeDomain.com" autocomplete ="off" required />

                                <label for="message">Votre message</label>
                                <textarea name="message" cols="40" rows="15"
                                    placeholder="Je vous contacte pour..." autocomplete="off"></textarea>
                        </div>
                
                <div class="formBottom">
                    <input type="submit" name="envoyer" value="Envoyer" />
                </div>
                </form>
		</section>
	</div>
	</body>
</html>
