<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!--import des fonts  lobster et montserrat depuis googlefonts-->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
			rel="stylesheet"
		/>

		<!--link css-->
		<link rel="stylesheet" href="./connexion.css" />
	</head>
  <body>
    <div class="main">
	<div class="separator"><h1 class="sectionTitle">Se connecter</h1></div>
    <!-- Container for the login form -->
    <section class="mailSection">
      <div class="mailSectionContent">
        <h2>Admin Login</h2>
        <!-- Login form with fields for username and password -->
        <form id="loginForm">
          <!-- Input group for the username field -->
          <div class="mailInput">
            <label for="username">Nom d'utilisateur</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Mon nom d'utilisateur V&Go"
              required
            />
          </div>
          <!-- Input group for the password field -->
          <div class="mailInput">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Mon mot de passe"
              required
            />
          </div>
          <!-- Submit button to trigger the form submission -->
                <div class="formBottom">
                    <input type="submit" name="login" value="Se connecter" />
                </div>
        </form>
      </div>
    </section>
</div>
    <!-- JavaScript file that handles the login functionality -->
    <script type="module" src="./script_login.js"></script>
  </body>
</html>
